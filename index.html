<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>72Flasher - Update Checker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .logo {
      margin-bottom: 12px;
    }

    .logo img {
      width: 120px;
      height: auto;
      border-radius: 16px;
    }

    .author {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 24px;
      font-style: italic;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 4px;
    }

    .version-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .version-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      text-align: left;
    }

    .version-value {
      font-size: 24px;
      font-weight: 700;
      text-align: right;
    }

    .version-value.current {
      color: #ffa726;
    }

    .version-value.latest {
      color: #66bb6a;
    }

    .update-banner {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      display: none;
    }

    .update-banner.needs-update {
      display: block;
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      animation: pulse 2s infinite;
    }

    .update-banner.up-to-date {
      display: block;
      background: linear-gradient(135deg, #43a047, #66bb6a);
    }

    .update-banner h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .update-banner p {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 16px;
    }

    .update-btn {
      display: inline-block;
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .update-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .status {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }

    .error {
      color: #ef5350;
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.4); }
      50% { box-shadow: 0 0 20px 4px rgba(255, 107, 53, 0.2); }
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="logo.png" alt="72Flasher Logo"></div>
    <h1>72Flasher</h1>
    <p class="subtitle">Update Checker</p>
    <p class="author">Khant Sithu Win</p>

    <div class="version-card">
      <div>
        <div class="version-label">Current Version</div>
      </div>
      <div class="version-value current" id="currentVersion">1.0.0</div>
    </div>

    <div class="version-card">
      <div>
        <div class="version-label">Latest Version</div>
      </div>
      <div class="version-value latest" id="latestVersion">
        <div class="spinner" id="spinner"></div>
      </div>
    </div>

    <div class="update-banner" id="updateBanner">
      <h2 id="bannerTitle"></h2>
      <p id="bannerMessage"></p>
      <a class="update-btn" id="downloadBtn" style="display:none;" target="_blank">Download Update</a>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="status" id="status">Checking for updates...</div>
  </div>

  <script>
    const CURRENT_VERSION = "1.0.0";
    const DOWNLOAD_URL = "https://drive.google.com/file/d/10pmrZ4-crq4a5dGlPq9-b7pWAQGgLJWj/view?usp=drive_link";

    function compareVersions(current, latest) {
      const a = current.split('.').map(Number);
      const b = latest.split('.').map(Number);
      for (let i = 0; i < Math.max(a.length, b.length); i++) {
        const x = a[i] || 0;
        const y = b[i] || 0;
        if (x < y) return -1;
        if (x > y) return 1;
      }
      return 0;
    }

    async function checkForUpdates() {
      const latestEl = document.getElementById('latestVersion');
      const spinner = document.getElementById('spinner');
      const banner = document.getElementById('updateBanner');
      const bannerTitle = document.getElementById('bannerTitle');
      const bannerMsg = document.getElementById('bannerMessage');
      const downloadBtn = document.getElementById('downloadBtn');
      const errorMsg = document.getElementById('errorMsg');
      const status = document.getElementById('status');

      try {
        const response = await fetch('update.json');
        if (!response.ok) throw new Error('Failed to fetch update.json');

        const data = await response.json();
        const latestVersion = data.latest_version;

        spinner.style.display = 'none';
        latestEl.textContent = latestVersion;

        const cmp = compareVersions(CURRENT_VERSION, latestVersion);

        if (cmp < 0) {
          banner.className = 'update-banner needs-update';
          bannerTitle.textContent = 'Update Available!';
          bannerMsg.textContent =
            'Version ' + latestVersion + ' is available. You are running ' + CURRENT_VERSION + '.';
          downloadBtn.href = DOWNLOAD_URL;
          downloadBtn.style.display = 'inline-block';
          downloadBtn.textContent = 'Download v' + latestVersion;
          status.textContent = 'A newer version is available.';
        } else {
          banner.className = 'update-banner up-to-date';
          bannerTitle.textContent = 'You\'re Up to Date!';
          bannerMsg.textContent = 'You are running the latest version (' + CURRENT_VERSION + ').';
          downloadBtn.style.display = 'none';
          status.textContent = 'No updates needed.';
        }
      } catch (err) {
        spinner.style.display = 'none';
        latestEl.textContent = '—';
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Error: ' + err.message;
        status.textContent = 'Update check failed.';
      }
    }

    document.addEventListener('DOMContentLoaded', checkForUpdates);
  </script>
</body>
</html>
