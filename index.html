<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src https://fonts.gstatic.com; connect-src 'self' https://raw.githubusercontent.com;">
  <link rel="icon" type="image/x-icon" href="icon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="icon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>72Flasher - Download</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Outfit', 'Inter', system-ui, sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e6edf3;
    }

    .shell { padding: 14px; width: 100%; max-width: 420px; }

    .app-root {
      background-color: #0d1117;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 28px 56px rgba(0, 0, 0, 0.55);
    }

    /* ── Top Bar ── */
    .top-bar {
      background: linear-gradient(to bottom, #1e242c, #181d24);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-bottom: 1px solid rgba(0, 0, 0, 0.45);
      border-radius: 14px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 14px 14px 0 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .brand-col { display: flex; flex-direction: column; gap: 1px; }

    .topbar-left { display: flex; align-items: center; gap: 10px; }

    .topbar-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      object-fit: contain;
      border: 1px solid rgba(88, 166, 255, 0.18);
      background: rgba(31, 111, 235, 0.08);
      padding: 3px;
      flex-shrink: 0;
    }

    .app-title {
      color: #60a5fa;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      line-height: 1.1;
    }

    .app-subtitle {
      color: rgba(56, 189, 248, 0.85);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    }

    .traffic-lights { display: flex; align-items: center; gap: 8px; padding: 0 4px; }

    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      cursor: default;
    }
    .dot.close { background: radial-gradient(circle at 50% 38%, #ff7b78, #ff605c); box-shadow: inset 0 0 0 0.8px #e54a47; }
    .dot.min   { background: radial-gradient(circle at 50% 38%, #ffd06e, #ffbd44); box-shadow: inset 0 0 0 0.8px #e5a835; }
    .dot.max   { background: radial-gradient(circle at 50% 38%, #34e070, #00ca4e); box-shadow: inset 0 0 0 0.8px #00b441; }

    /* ── Content ── */
    .content { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Glass Card ── */
    .glass-card {
      background: linear-gradient(to bottom, #1e242c, #191e26);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.26);
    }

    /* ── Branding card ── */
    .brand-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
    }

    .brand-card img {
      width: 48px; height: 48px;
      border-radius: 10px;
      object-fit: contain;
      background: rgba(31, 111, 235, 0.08);
      border: 1px solid rgba(88, 166, 255, 0.15);
      padding: 4px;
    }

    .brand-info h1 {
      color: #e6edf3;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      margin-bottom: 3px;
    }

    .section-label {
      display: inline-block;
      color: #8b949e;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      background-color: rgba(22, 27, 34, 0.7);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-left: 2px solid #1f6feb;
      border-radius: 6px;
      padding: 2px 8px;
      margin-bottom: 6px;
    }

    .owner-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .owner-name {
      color: #8b949e;
      font-size: 11px;
      font-weight: 600;
    }

    .owner-divider {
      color: rgba(139, 148, 158, 0.35);
      font-size: 11px;
    }

    .owner-link {
      color: #58a6ff;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .owner-link:hover { color: #79c0ff; text-decoration: underline; }

    /* ── Website Icon Button (tool WebsiteButton style) ── */
    .website-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(88, 166, 255, 0.08);
      border: 1px solid rgba(88, 166, 255, 0.22);
      color: #58a6ff;
      text-decoration: none;
      transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
      flex-shrink: 0;
    }
    .website-btn:hover {
      background: rgba(88, 166, 255, 0.18);
      border-color: rgba(88, 166, 255, 0.55);
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.25);
    }
    .website-btn svg { width: 16px; height: 16px; }

    /* ── Download card ── */
    .download-card { padding: 18px 20px; }

    .download-label {
      color: #8b949e;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.10em;
      margin-bottom: 10px;
    }

    /* Loading state */
    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(139, 148, 158, 0.2);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    .loading-text {
      color: #8b949e;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Download Button (PrimaryButton style) ── */
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background-color: #1f6feb;
      color: #ffffff;
      border: 1px solid rgba(56, 139, 253, 0.5);
      border-radius: 8px;
      padding: 11px 20px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      letter-spacing: 0.03em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 18px rgba(31, 111, 235, 0.35);
    }
    .download-btn:hover {
      background-color: #388bfd;
      box-shadow: 0 6px 24px rgba(56, 139, 253, 0.45);
    }
    .download-btn:active { background-color: #1158c7; }

    .btn-icon { font-size: 16px; }

    .btn-sub {
      font-size: 10px;
      font-weight: 500;
      opacity: 0.75;
      letter-spacing: 0.05em;
    }

    /* Up-to-date state */
    .uptodate-row {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(63, 185, 80, 0.08);
      border: 1px solid rgba(46, 160, 67, 0.3);
      border-left: 2px solid #3fb950;
      border-radius: 8px;
    }

    .uptodate-icon { font-size: 16px; color: #3fb950; }

    .uptodate-text {
      color: #56d364;
      font-size: 12px;
      font-weight: 600;
    }

    /* Error state */
    .error-row {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(248, 81, 73, 0.08);
      border: 1px solid rgba(248, 81, 73, 0.25);
      border-left: 2px solid #f85149;
      border-radius: 8px;
    }

    .error-icon { font-size: 16px; color: #f85149; }

    .error-text {
      color: #f85149;
      font-size: 11px;
      font-weight: 500;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="app-root">

      <!-- Top Bar -->
      <div class="top-bar">
        <div class="topbar-left">
          <img class="topbar-icon"
               src="icon.ico"
               alt="icon"
               onerror="this.style.display='none'">
          <div class="brand-col">
            <span class="app-title">72FLASHER</span>
            <span class="app-subtitle">Khant Sithu Win</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <!-- Website Icon Button -->
          <a class="website-btn" href="https://kstw72.qzz.io" target="_blank" title="kstw72.qzz.io">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </a>
          <div class="traffic-lights">
            <div class="dot min"   title="Minimize"></div>
            <div class="dot max"   title="Maximize"></div>
            <div class="dot close" title="Close"></div>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="content">

        <!-- Branding -->
        <div class="glass-card brand-card">
          <div class="brand-info">
            <h1>72Flasher</h1>
            <span class="section-label">FASTBOOT FLASHER TOOL</span>
            <div class="owner-row">
              <span class="owner-name">Khant Sithu Win</span>
            </div>
          </div>
        </div>

        <!-- Download Card -->
        <div class="glass-card download-card">
          <div class="download-label">DOWNLOAD</div>

          <!-- Loading -->
          <div class="loading-row" id="loadingRow">
            <div class="spinner"></div>
            <span class="loading-text">Fetching latest release...</span>
          </div>

          <!-- Download Button (hidden until ready) -->
          <a class="download-btn" id="downloadBtn" style="display:none;" target="_blank">
            <span class="btn-icon">&#11123;</span>
            <span id="btnLabel">Download 72Flasher</span>
            <span class="btn-sub" id="btnSub"></span>
          </a>

          <!-- Up to date -->
          <div class="uptodate-row" id="uptodateRow">
            <span class="uptodate-icon">&#10004;</span>
            <span class="uptodate-text" id="uptodateText">You are running the latest version.</span>
          </div>

          <!-- Error -->
          <div class="error-row" id="errorRow">
            <span class="error-icon">&#9888;</span>
            <span class="error-text" id="errorText">Unable to reach update server.</span>
          </div>
        </div>

      </div><!-- /content -->
    </div><!-- /app-root -->
  </div><!-- /shell -->

  <script>
    const CURRENT_VERSION = "1.0.0";
    const FALLBACK_URL    = "https://drive.google.com/file/d/1OZudLQMyfUx4zi3Zro8p3x2vNTI7XXMk/view?usp=drive_link";

    const UPDATE_JSON_URLS = [
      'https://raw.githubusercontent.com/kstw72-mya/72flasher/main/update.json',
      'https://raw.githubusercontent.com/kstw72-mya/72flasher/master/update.json',
      'update.json'
    ];

    function compareVersions(current, latest) {
      const a = current.split('.').map(Number);
      const b = latest.split('.').map(Number);
      for (let i = 0; i < Math.max(a.length, b.length); i++) {
        const x = a[i] || 0, y = b[i] || 0;
        if (x < y) return -1;
        if (x > y) return  1;
      }
      return 0;
    }

    async function fetchWithFallback(urls) {
      let lastErr;
      for (const url of urls) {
        try {
          const resp = await fetch(url, { cache: 'no-store' });
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          return await resp.json();
        } catch (e) { lastErr = e; }
      }
      throw lastErr || new Error('All sources failed');
    }

    async function checkForUpdates() {
      const loadingRow  = document.getElementById('loadingRow');
      const downloadBtn = document.getElementById('downloadBtn');
      const btnLabel    = document.getElementById('btnLabel');
      const btnSub      = document.getElementById('btnSub');
      const uptodateRow = document.getElementById('uptodateRow');
      const uptodateText= document.getElementById('uptodateText');
      const errorRow    = document.getElementById('errorRow');
      const errorText   = document.getElementById('errorText');

      try {
        const data          = await fetchWithFallback(UPDATE_JSON_URLS);
        const latestVersion = data.latest_version;
        const releaseUrl    = data.download_url || FALLBACK_URL;
        const cmp           = compareVersions(CURRENT_VERSION, latestVersion);

        loadingRow.style.display = 'none';

        if (cmp < 0) {
          // Update available — show download button
          downloadBtn.href       = releaseUrl;
          btnLabel.textContent   = 'Download v' + latestVersion;
          btnSub.textContent     = 'Latest release';
          downloadBtn.style.display = 'flex';
        } else {
          // Up to date
          uptodateText.textContent = 'You are on the latest version (v' + CURRENT_VERSION + ').';
          uptodateRow.style.display = 'flex';
        }

      } catch (err) {
        // Error — show fallback download button anyway
        loadingRow.style.display  = 'none';
        downloadBtn.href          = FALLBACK_URL;
        btnLabel.textContent      = 'Download 72Flasher';
        btnSub.textContent        = '';
        downloadBtn.style.display = 'flex';
        errorText.textContent     = 'Could not check for updates. Showing last known download.';
        errorRow.style.display    = 'flex';
      }
    }

    document.addEventListener('DOMContentLoaded', checkForUpdates);
  </script>
</body>
</html>
